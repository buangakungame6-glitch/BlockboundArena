<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Blockbound Arena — Multiplayer Puzzle Battle</title>

  <!-- Tailwind CSS CDN (play) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['monospace'] },
        },
      },
    };
  </script>

  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Socket.IO Client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    /* ========================================================================= */
    /*  Blockbound Arena — All Custom CSS                                        */
    /* ========================================================================= */

    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: monospace;
      background: #1a1a2e;
      color: #ffd700;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    /* Keyframes */
    @keyframes pixelFloat {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(2deg); }
      75% { transform: translateY(5px) rotate(-1deg); }
    }

    @keyframes blockPulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes lineClear {
      0% { background-color: white; transform: scale(1.1); }
      50% { background-color: white; transform: scale(0.9); opacity: 0.5; }
      100% { background-color: transparent; transform: scale(0); opacity: 0; }
    }

    @keyframes skillGlow {
      0% { box-shadow: 0 0 5px currentColor; }
      50% { box-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
      100% { box-shadow: 0 0 5px currentColor; }
    }

    @keyframes comboFire {
      0% { text-shadow: 0 0 5px #ff6600, 0 0 10px #ff3300; }
      50% { text-shadow: 0 0 20px #ff6600, 0 0 30px #ff3300, 0 0 40px #ff0000; }
      100% { text-shadow: 0 0 5px #ff6600, 0 0 10px #ff3300; }
    }

    @keyframes screenShake {
      0%, 100% { transform: translateX(0); }
      10% { transform: translateX(-5px) translateY(2px); }
      20% { transform: translateX(5px) translateY(-2px); }
      30% { transform: translateX(-3px) translateY(3px); }
      40% { transform: translateX(3px) translateY(-1px); }
      50% { transform: translateX(-2px); }
      60% { transform: translateX(2px); }
      70% { transform: translateX(-1px); }
    }

    @keyframes confetti {
      0% { transform: translateY(0) rotateZ(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0; }
    }

    @keyframes energyFill {
      0% { width: 0%; }
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes popIn {
      0% { transform: scale(0) rotate(-10deg); }
      60% { transform: scale(1.1) rotate(2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    @keyframes scoreFlash {
      0% { transform: scale(1.2); color: #fff; }
      100% { transform: scale(1); color: #facc15; }
    }

    /* Pixel Art Utility Classes */
    .pixel-font {
      font-family: monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      image-rendering: pixelated;
    }

    .pixel-border {
      border: 3px solid;
      border-color: #ffd700 #5a4a00 #5a4a00 #ffd700;
      box-shadow: inset 0 0 0 1px #ffd700, 0 0 0 1px #5a4a00;
    }

    .pixel-btn {
      font-family: monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 3px solid;
      border-color: #ffd700 #5a4a00 #5a4a00 #ffd700;
      box-shadow: inset 0 0 0 1px #ffd700, 0 0 0 1px #5a4a00;
      background: linear-gradient(180deg, #4a3728 0%, #2d1f14 100%);
      color: #ffd700;
      padding: 12px 32px;
      cursor: pointer;
      transition: all 0.1s;
      position: relative;
    }

    .pixel-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #5a4738 0%, #3d2f24 100%);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px #ffd700, 0 0 0 1px #5a4a00, 0 0 15px rgba(255, 215, 0, 0.3);
    }

    .pixel-btn:active:not(:disabled) {
      border-color: #5a4a00 #ffd700 #ffd700 #5a4a00;
      transform: translateY(1px);
    }

    .pixel-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .pixel-card {
      border: 3px solid;
      border-color: #555 #222 #222 #555;
      background: rgba(30, 30, 50, 0.9);
      backdrop-filter: blur(5px);
    }

    .board-cell {
      transition: background-color 0.15s ease, transform 0.1s ease;
      image-rendering: pixelated;
    }

    .board-cell-filled {
      box-shadow: inset 2px 2px 0 rgba(255,255,255,0.3), inset -2px -2px 0 rgba(0,0,0,0.3);
    }

    .board-cell-hover {
      opacity: 0.6;
      animation: blockPulse 0.5s ease-in-out infinite;
    }

    .notification-enter {
      animation: slideInRight 0.3s ease-out;
    }

    .game-bg {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
    }

    /* Animation utility classes */
    .anim-slide-down { animation: slideDown 0.8s ease-out both; }
    .anim-slide-up { animation: slideUp 0.8s ease-out both; }
    .anim-fade-in { animation: fadeIn 1s ease-out both; }
    .anim-scale-in { animation: scaleIn 0.3s ease-out both; }
    .anim-pop-in { animation: popIn 0.6s ease-out both; }
    .anim-fade-in-up { animation: fadeInUp 0.8s ease-out both; }
    .anim-slide-in-right { animation: slideInRight 0.3s ease-out both; }
    .anim-delay-1 { animation-delay: 0.1s; }
    .anim-delay-2 { animation-delay: 0.2s; }
    .anim-delay-3 { animation-delay: 0.3s; }
    .anim-delay-4 { animation-delay: 0.4s; }
    .anim-delay-5 { animation-delay: 0.5s; }
    .anim-delay-8 { animation-delay: 0.8s; }

    /* Block hover effects */
    .block-preview:hover:not(.is-dragging) {
      background: rgba(255,255,255,0.05);
      transform: scale(1.05) translateY(-2px);
      transition: all 0.15s ease;
    }
    .block-preview:active:not(.is-dragging) {
      transform: scale(0.95);
      transition: all 0.1s ease;
    }
    .block-preview.is-being-dragged {
      opacity: 0.2;
      transform: scale(0.9);
    }

    /* Score flash */
    .score-flash {
      animation: scoreFlash 0.3s ease-out;
    }

    /* Screen shake */
    .screen-shake {
      animation: screenShake 0.5s ease-in-out;
    }

    /* Confetti */
    .confetti-particle {
      position: absolute;
      top: -20px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    /* ========================================================================= */
    /*  Blockbound Arena — Complete Single-File Game                              */
    /* ========================================================================= */

    const { useState, useEffect, useReducer, useCallback, useMemo, useRef, useContext, createContext, memo } = React;

    // =========================================================================
    //  CONSTANTS
    // =========================================================================

    const BOARD_SIZE = 10;

    const BLOCK_COLORS = [
      '',        // 0 = empty
      '#ef4444', // 1 = red
      '#f97316', // 2 = orange
      '#eab308', // 3 = yellow
      '#22c55e', // 4 = green
      '#3b82f6', // 5 = blue
      '#8b5cf6', // 6 = violet
      '#ec4899', // 7 = pink
    ];

    const GARBAGE_COLOR = '#555555';
    const GHOST_CELL = 24;
    const PREVIEW_CELL = 20;
    const CELL_SIZES = { sm: 12, md: 24, lg: 30 };
    const AVAILABLE_BLOCK_COUNT = 3;

    // =========================================================================
    //  CHARACTER DEFINITIONS
    // =========================================================================

    const CHARACTERS = [
      {
        id: 'arcane_hacker', name: 'Arcane Hacker', role: 'Aggressive Saboteur', emoji: '\u{1F9E0}',
        description: 'Hood ungu gelap, mata neon cyan, magic glitch wizard',
        skillName: 'Corrupt', skillDescription: 'Mengirim 3 corrupted block random ke board lawan',
        color: '#7c3aed', maxEnergy: 100, cooldown: 25,
      },
      {
        id: 'time_keeper', name: 'Time Keeper', role: 'Control', emoji: '\u23F3',
        description: 'Mage jam emas dengan staff clock magic',
        skillName: 'Slow Motion', skillDescription: 'Input lawan delay beberapa detik',
        color: '#eab308', maxEnergy: 100, cooldown: 30,
      },
      {
        id: 'bomber_dwarf', name: 'Bomber Dwarf', role: 'Escape / Clutch', emoji: '\u{1F4A3}',
        description: 'Dwarf kecil pembawa TNT, armor merah',
        skillName: 'Boom Burst', skillDescription: 'Menghancurkan area 3x3 pada board sendiri',
        color: '#dc2626', maxEnergy: 80, cooldown: 20,
      },
      {
        id: 'trickster', name: 'Trickster', role: 'Chaos', emoji: '\u{1F3AD}',
        description: 'Jester medieval dengan topeng senyum misterius',
        skillName: 'Dizzy Board', skillDescription: 'Board lawan berputar perlahan terus-menerus',
        color: '#f97316', maxEnergy: 100, cooldown: 30,
      },
      {
        id: 'architect', name: 'Architect', role: 'Tactical', emoji: '\u{1F3D7}\uFE0F',
        description: 'Builder mage dengan blueprint magic scroll',
        skillName: 'Perfect Piece', skillDescription: 'Player dapat memilih 1 bentuk block yang diinginkan',
        color: '#059669', maxEnergy: 80, cooldown: 25,
      },
      {
        id: 'vampire_lord', name: 'Vampire Lord', role: 'Sustain', emoji: '\u{1FA78}',
        description: 'Noble vampire dengan cape merah hitam',
        skillName: 'Blood Drain', skillDescription: 'Saat clear line: mengurangi sampah sendiri & menambah block lawan',
        color: '#991b1b', maxEnergy: 100, cooldown: 20,
      },
      {
        id: 'magnet_mage', name: 'Magnet Mage', role: 'Combo Utility', emoji: '\u{1F9F2}',
        description: 'Mage elektromagnetik dengan armor biru silver',
        skillName: 'Magnetic Pull', skillDescription: '2 block terdekat otomatis merapat',
        color: '#2563eb', maxEnergy: 80, cooldown: 22,
      },
      {
        id: 'joker', name: 'Joker', role: 'Gambling Chaos', emoji: '\u{1F3B2}',
        description: 'Floating magic cards dengan senyum gila',
        skillName: 'Lucky Spin', skillDescription: 'Efek random: buff diri, nerf lawan, atau self-disaster',
        color: '#ec4899', maxEnergy: 100, cooldown: 18,
      },
      {
        id: 'samurai', name: 'Samurai', role: 'Precision', emoji: '\u2694\uFE0F',
        description: 'Ronin pixel warrior dengan glowing katana',
        skillName: 'Phantom Slash', skillDescription: 'Menghapus 1 garis horizontal penuh',
        color: '#6b7280', maxEnergy: 90, cooldown: 22,
      },
    ];

    function getCharacter(id) {
      return CHARACTERS.find(c => c.id === id);
    }

    // =========================================================================
    //  BOARD LOGIC
    // =========================================================================

    function canPlaceBlock(board, block, position) {
      for (const cell of block.cells) {
        const r = position.row + cell.row;
        const c = position.col + cell.col;
        if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) return false;
        if (board[r][c] !== 0) return false;
      }
      return true;
    }

    function getCellColor(color) {
      if (color === 0) return 'transparent';
      if (color === 8) return GARBAGE_COLOR;
      return BLOCK_COLORS[color] || '#888';
    }

    function getShapeBounds(cells) {
      let maxRow = 0, maxCol = 0;
      for (const cell of cells) {
        if (cell.row > maxRow) maxRow = cell.row;
        if (cell.col > maxCol) maxCol = cell.col;
      }
      return { rows: maxRow + 1, cols: maxCol + 1 };
    }

    // =========================================================================
    //  GAME STATE — React Context + useReducer
    // =========================================================================

    const initialState = {
      isConnected: false,
      socketId: null,
      currentScreen: 'menu',
      playerName: '',
      playerId: null,
      selectedCharacterId: null,
      isReady: false,
      roomId: null,
      roomMode: 'duel',
      isHost: false,
      players: [],
      availableBlocks: [],
      selectedBlock: null,
      winnerId: null,
      rankings: [],
      notifications: [],
      skillUsedBy: null,
      screenShake: false,
      gameStartTime: null,
    };

    function gameReducer(state, action) {
      switch (action.type) {
        case 'SET_CONNECTED':
          return { ...state, isConnected: action.connected, socketId: action.socketId || null };

        case 'SET_SCREEN':
          return { ...state, currentScreen: action.screen };

        case 'SET_PLAYER_NAME':
          return { ...state, playerName: action.name };

        case 'SET_PLAYER_ID':
          return { ...state, playerId: action.id };

        case 'SELECT_CHARACTER':
          return { ...state, selectedCharacterId: action.characterId };

        case 'SET_READY':
          return { ...state, isReady: action.ready };

        case 'SET_ROOM':
          return { ...state, roomId: action.roomId, roomMode: action.mode, isHost: action.isHost };

        case 'CLEAR_ROOM':
          return {
            ...state,
            roomId: null, roomMode: 'duel', isHost: false,
            players: [], isReady: false, selectedCharacterId: null,
          };

        case 'SET_PLAYERS':
          return { ...state, players: action.players };

        case 'UPDATE_PLAYER':
          return {
            ...state,
            players: state.players.map(p => p.id === action.playerId ? { ...p, ...action.updates } : p),
          };

        case 'SET_AVAILABLE_BLOCKS':
          return { ...state, availableBlocks: action.blocks };

        case 'SELECT_BLOCK':
          return { ...state, selectedBlock: action.block };

        case 'SET_WINNER':
          return { ...state, winnerId: action.winnerId };

        case 'SET_RANKINGS':
          return { ...state, rankings: action.rankings };

        case 'ADD_NOTIFICATION':
          return { ...state, notifications: [...state.notifications, action.notification] };

        case 'REMOVE_NOTIFICATION':
          return { ...state, notifications: state.notifications.filter(n => n.id !== action.id) };

        case 'SET_SKILL_USED_BY':
          return { ...state, skillUsedBy: action.data };

        case 'TRIGGER_SCREEN_SHAKE':
          return { ...state, screenShake: true };

        case 'CLEAR_SCREEN_SHAKE':
          return { ...state, screenShake: false };

        case 'SET_GAME_START_TIME':
          return { ...state, gameStartTime: action.time };

        case 'RESET_GAME':
          return {
            ...initialState,
            playerName: state.playerName,
            playerId: state.playerId,
            socketId: state.socketId,
            isConnected: state.isConnected,
          };

        default:
          return state;
      }
    }

    const GameContext = createContext(null);

    function GameProvider({ children }) {
      const [state, dispatch] = useReducer(gameReducer, initialState);
      const stateRef = useRef(state);
      stateRef.current = state;

      const actions = useMemo(() => ({
        setConnected: (connected, socketId) => dispatch({ type: 'SET_CONNECTED', connected, socketId }),
        setScreen: (screen) => dispatch({ type: 'SET_SCREEN', screen }),
        setPlayerName: (name) => dispatch({ type: 'SET_PLAYER_NAME', name }),
        setPlayerId: (id) => dispatch({ type: 'SET_PLAYER_ID', id }),
        selectCharacter: (characterId) => dispatch({ type: 'SELECT_CHARACTER', characterId }),
        setReady: (ready) => dispatch({ type: 'SET_READY', ready }),
        setRoom: (roomId, mode, isHost) => dispatch({ type: 'SET_ROOM', roomId, mode, isHost }),
        clearRoom: () => dispatch({ type: 'CLEAR_ROOM' }),
        setPlayers: (players) => dispatch({ type: 'SET_PLAYERS', players }),
        updatePlayer: (playerId, updates) => dispatch({ type: 'UPDATE_PLAYER', playerId, updates }),
        setAvailableBlocks: (blocks) => dispatch({ type: 'SET_AVAILABLE_BLOCKS', blocks }),
        selectBlock: (block) => dispatch({ type: 'SELECT_BLOCK', block }),
        setWinner: (winnerId) => dispatch({ type: 'SET_WINNER', winnerId }),
        setRankings: (rankings) => dispatch({ type: 'SET_RANKINGS', rankings }),
        addNotification: (notification) => dispatch({ type: 'ADD_NOTIFICATION', notification }),
        removeNotification: (id) => dispatch({ type: 'REMOVE_NOTIFICATION', id }),
        setSkillUsedBy: (data) => dispatch({ type: 'SET_SKILL_USED_BY', data }),
        triggerScreenShake: () => {
          dispatch({ type: 'TRIGGER_SCREEN_SHAKE' });
          setTimeout(() => dispatch({ type: 'CLEAR_SCREEN_SHAKE' }), 500);
        },
        setGameStartTime: (time) => dispatch({ type: 'SET_GAME_START_TIME', time }),
        resetGame: () => dispatch({ type: 'RESET_GAME' }),
        getState: () => stateRef.current,
      }), []);

      return (
        <GameContext.Provider value={{ state, ...actions }}>
          {children}
        </GameContext.Provider>
      );
    }

    function useGame() {
      return useContext(GameContext);
    }

    // =========================================================================
    //  NOTIFICATION HELPER
    // =========================================================================

    function notify(message, type = 'info') {
      const id = `notif_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
      const { addNotification, removeNotification } = useGame();
      addNotification({ id, message, type, timestamp: Date.now() });
      setTimeout(() => removeNotification(id), 3000);
    }

    // =========================================================================
    //  SOCKET HOOK
    // =========================================================================

    function useGameSocket() {
      const socketRef = useRef(null);
      const gs = useGame();

      useEffect(() => {
        const socket = io({
          path: '/socket.io/',
          transports: ['websocket', 'polling'],
          forceNew: true,
          reconnection: true,
          reconnectionAttempts: 5,
          reconnectionDelay: 1000,
          timeout: 10000,
        });

        socketRef.current = socket;

        // Connection
        socket.on('connect', () => {
          gs.setConnected(true, socket.id);
        });

        socket.on('disconnect', () => {
          gs.setConnected(false);
          notify('Disconnected from server', 'danger');
        });

        // Room events
        socket.on('room-created', (data) => {
          gs.setPlayerId(data.playerId);
          gs.setRoom(data.roomId, data.mode, true);
          gs.setScreen('lobby');
          notify(`Room created: ${data.roomId}`, 'success');
        });

        socket.on('room-joined', (data) => {
          gs.setPlayerId(data.playerId);
          gs.setRoom(data.roomId, data.mode, false);
          gs.setPlayers(data.players);
          gs.setScreen('lobby');
          notify(`Joined room: ${data.roomId}`, 'success');
        });

        socket.on('room-update', (data) => {
          gs.setPlayers(data.players);
        });

        // Game events
        socket.on('game-started', (data) => {
          gs.setPlayers(data.players);
          const myId = gs.getState().playerId;
          if (myId && data.players) {
            const me = data.players.find(p => p.id === myId);
            if (me && me.availableBlocks) {
              gs.setAvailableBlocks(me.availableBlocks);
            }
          }
          if (data.availableBlocks) {
            gs.setAvailableBlocks(data.availableBlocks);
          }
          gs.setScreen('game');
          gs.setGameStartTime(data.startTime);
          notify('Game started!', 'success');
        });

        socket.on('game-state-update', (data) => {
          gs.setPlayers(data.players);
        });

        socket.on('blocks-update', (data) => {
          if (data.availableBlocks) {
            const currentBlocks = gs.getState().availableBlocks;
            const newIds = data.availableBlocks.map(b => b.id).sort().join(',');
            const currentIds = currentBlocks.map(b => b.id).sort().join(',');
            if (newIds !== currentIds) {
              gs.setAvailableBlocks(data.availableBlocks);
            }
          }
        });

        socket.on('skill-used', (data) => {
          gs.setSkillUsedBy(data);
          gs.triggerScreenShake();
          const sourcePlayer = gs.getState().players.find(p => p.id === data.sourceId);
          const sourceName = sourcePlayer ? sourcePlayer.name : 'Unknown';
          notify(`${sourceName} used ${data.skillName}!`, 'skill');
          setTimeout(() => {
            const current = gs.getState().skillUsedBy;
            if (current && current.sourceId === data.sourceId) {
              gs.setSkillUsedBy(null);
            }
          }, 2000);
        });

        socket.on('player-eliminated', (data) => {
          notify(`${data.playerName} was eliminated!`, 'danger');
        });

        socket.on('game-over', (data) => {
          gs.setWinner(data.winnerId);
          gs.setRankings(data.rankings);
          gs.setScreen('game-over');
        });

        socket.on('error', (data) => {
          notify(data.message || 'An error occurred', 'danger');
        });

        return () => {
          socket.disconnect();
          socketRef.current = null;
        };
      }, []);

      const createRoom = useCallback((playerName, mode) => {
        socketRef.current && socketRef.current.emit('create-room', { playerName, mode });
      }, []);

      const joinRoom = useCallback((roomId, playerName) => {
        socketRef.current && socketRef.current.emit('join-room', { roomId, playerName });
      }, []);

      const leaveRoom = useCallback(() => {
        socketRef.current && socketRef.current.emit('leave-room');
        gs.clearRoom();
        gs.setScreen('menu');
      }, [gs]);

      const selectCharacterSocket = useCallback((characterId) => {
        socketRef.current && socketRef.current.emit('select-character', { characterId });
      }, []);

      const playerReady = useCallback((ready) => {
        socketRef.current && socketRef.current.emit('player-ready', { ready });
      }, []);

      const startGame = useCallback(() => {
        socketRef.current && socketRef.current.emit('start-game');
      }, []);

      const placeBlock = useCallback((block, position) => {
        socketRef.current && socketRef.current.emit('place-block', { block, position });
      }, []);

      const handleUseSkill = useCallback((targetId) => {
        socketRef.current && socketRef.current.emit('use-skill', { targetId });
      }, []);

      const playAgain = useCallback(() => {
        socketRef.current && socketRef.current.emit('play-again');
      }, []);

      return {
        createRoom, joinRoom, leaveRoom,
        selectCharacter: selectCharacterSocket,
        playerReady, startGame, placeBlock,
        useSkill: handleUseSkill, playAgain,
      };
    }

    // =========================================================================
    //  COMPONENTS
    // =========================================================================

    // ---- FloatingBlocks (MainMenu decoration) ----
    const FLOAT_COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#8b5cf6', '#ec4899'];
    const FLOAT_SIZES = [24, 32, 28, 20, 36, 22, 30];

    function FloatingBlocks() {
      return (
        <div className="absolute inset-0 overflow-hidden pointer-events-none">
          {FLOAT_COLORS.map((color, i) => (
            <div
              key={i}
              className="absolute rounded-sm board-cell-filled"
              style={{
                width: FLOAT_SIZES[i], height: FLOAT_SIZES[i],
                backgroundColor: color, opacity: 0.15,
                left: `${8 + i * 13}%`, top: `${15 + (i % 3) * 25}%`,
                animation: `pixelFloat ${4 + i * 0.7}s ease-in-out infinite`,
                animationDelay: `${i * 0.4}s`,
              }}
            />
          ))}
          {FLOAT_COLORS.map((color, i) => (
            <div
              key={`b-${i}`}
              className="absolute rounded-sm board-cell-filled"
              style={{
                width: FLOAT_SIZES[(i + 3) % FLOAT_SIZES.length],
                height: FLOAT_SIZES[(i + 3) % FLOAT_SIZES.length],
                backgroundColor: color, opacity: 0.08,
                left: `${55 + i * 6}%`, top: `${10 + (i % 4) * 22}%`,
                animation: `pixelFloat ${5 + i * 0.5}s ease-in-out infinite`,
                animationDelay: `${i * 0.6 + 1}s`,
              }}
            />
          ))}
        </div>
      );
    }

    // ---- MainMenu ----
    function MainMenu({ onCreateRoom, onJoinRoom, isConnected }) {
      const [showCreateDialog, setShowCreateDialog] = useState(false);
      const [showJoinDialog, setShowJoinDialog] = useState(false);
      const [nameInput, setNameInput] = useState('');
      const [modeSelect, setModeSelect] = useState('duel');
      const [roomIdInput, setRoomIdInput] = useState('');

      const handleCreate = () => {
        const name = nameInput.trim();
        if (!name) return;
        onCreateRoom(name, modeSelect);
        setShowCreateDialog(false);
        setNameInput('');
      };

      const handleJoin = () => {
        const name = nameInput.trim();
        const room = roomIdInput.trim().toUpperCase();
        if (!name || !room) return;
        onJoinRoom(room, name);
        setShowJoinDialog(false);
        setNameInput('');
        setRoomIdInput('');
      };

      return (
        <div className="relative flex flex-col items-center justify-center min-h-screen px-4 game-bg overflow-hidden">
          <FloatingBlocks />

          <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-transparent via-yellow-500/30 to-transparent" />

          {/* Title */}
          <div className="relative z-10 text-center mb-12 anim-slide-down">
            <div className="flex justify-center gap-1 mb-2">
              {[...Array(7)].map((_, i) => (
                <div
                  key={i}
                  className="w-3 h-3"
                  style={{
                    backgroundColor: i === 3 ? '#ffd700' : i % 2 === 0 ? '#ffd700' : 'transparent',
                  }}
                />
              ))}
            </div>
            <h1 className="pixel-font text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold text-yellow-400 drop-shadow-[0_0_30px_rgba(255,215,0,0.3)] tracking-widest">
              BLOCKBOUND
            </h1>
            <h2 className="pixel-font text-2xl sm:text-3xl md:text-4xl font-bold text-yellow-500/80 mt-1 tracking-[0.3em]">
              ARENA
            </h2>
            <div className="flex items-center justify-center mt-4 gap-2">
              <div className="h-0.5 w-16 bg-yellow-600/50" />
              <div className="w-2 h-2 bg-yellow-500 rotate-45" />
              <div className="h-0.5 w-16 bg-yellow-600/50" />
            </div>
            <p className="pixel-font text-sm text-yellow-300/60 mt-3 tracking-widest">
              Multiplayer Puzzle Battle
            </p>
          </div>

          {/* Buttons */}
          <div className="relative z-10 flex flex-col gap-4 w-full max-w-xs anim-slide-up anim-delay-3">
            {!isConnected && (
              <div className="pixel-font text-xs text-red-400 text-center mb-2 animate-pulse">
                Connecting to server...
              </div>
            )}
            <button
              className="pixel-btn w-full text-lg py-4"
              onClick={() => setShowCreateDialog(true)}
              disabled={!isConnected}
            >
              <span className="flex items-center justify-center gap-2">
                <span>{'\u2694\uFE0F'}</span>
                <span>Create Room</span>
              </span>
            </button>
            <button
              className="pixel-btn w-full text-lg py-4"
              onClick={() => setShowJoinDialog(true)}
              disabled={!isConnected}
            >
              <span className="flex items-center justify-center gap-2">
                <span>{'\u{1F3E0}'}</span>
                <span>Join Room</span>
              </span>
            </button>
          </div>

          <div className="relative z-10 mt-12 pixel-font text-xs text-yellow-600/30 anim-fade-in anim-delay-8">
            v1.0 — Blockbound Arena
          </div>

          {/* CREATE ROOM DIALOG */}
          {showCreateDialog && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
              <div className="pixel-card p-6 w-full max-w-sm anim-scale-in">
                <h3 className="pixel-font text-xl text-yellow-400 mb-4 text-center">
                  Create Room
                </h3>
                <label className="pixel-font text-xs text-yellow-300/70 block mb-1">YOUR NAME</label>
                <input
                  type="text" maxLength={16}
                  value={nameInput}
                  onChange={(e) => setNameInput(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && handleCreate()}
                  placeholder="Enter your name..."
                  className="w-full bg-black/50 border-2 border-yellow-700 text-yellow-200 px-3 py-2 pixel-font text-sm mb-4 focus:border-yellow-500 focus:outline-none placeholder:text-yellow-800"
                  autoFocus
                />
                <label className="pixel-font text-xs text-yellow-300/70 block mb-2">GAME MODE</label>
                <div className="flex gap-2 mb-5">
                  <button
                    className={`pixel-btn flex-1 text-sm py-2 ${modeSelect === 'duel' ? 'ring-2 ring-yellow-400' : ''}`}
                    onClick={() => setModeSelect('duel')}
                  >
                    {'\u2694\uFE0F'} Duel
                  </button>
                  <button
                    className={`pixel-btn flex-1 text-sm py-2 ${modeSelect === 'arena' ? 'ring-2 ring-yellow-400' : ''}`}
                    onClick={() => setModeSelect('arena')}
                  >
                    {'\u{1F3DF}\uFE0F'} Arena
                  </button>
                </div>
                <div className="flex gap-2">
                  <button
                    className="pixel-btn flex-1 text-sm py-2 opacity-60"
                    onClick={() => { setShowCreateDialog(false); setNameInput(''); }}
                  >
                    Cancel
                  </button>
                  <button
                    className="pixel-btn flex-1 text-sm py-2"
                    onClick={handleCreate}
                    disabled={!nameInput.trim()}
                  >
                    Create
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* JOIN ROOM DIALOG */}
          {showJoinDialog && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
              <div className="pixel-card p-6 w-full max-w-sm anim-scale-in">
                <h3 className="pixel-font text-xl text-yellow-400 mb-4 text-center">
                  Join Room
                </h3>
                <label className="pixel-font text-xs text-yellow-300/70 block mb-1">YOUR NAME</label>
                <input
                  type="text" maxLength={16}
                  value={nameInput}
                  onChange={(e) => setNameInput(e.target.value)}
                  placeholder="Enter your name..."
                  className="w-full bg-black/50 border-2 border-yellow-700 text-yellow-200 px-3 py-2 pixel-font text-sm mb-4 focus:border-yellow-500 focus:outline-none placeholder:text-yellow-800"
                  autoFocus
                />
                <label className="pixel-font text-xs text-yellow-300/70 block mb-1">ROOM CODE</label>
                <input
                  type="text" maxLength={6}
                  value={roomIdInput}
                  onChange={(e) => setRoomIdInput(e.target.value.toUpperCase())}
                  onKeyDown={(e) => e.key === 'Enter' && handleJoin()}
                  placeholder="ABC123"
                  className="w-full bg-black/50 border-2 border-yellow-700 text-yellow-200 px-3 py-2 pixel-font text-sm mb-5 focus:border-yellow-500 focus:outline-none placeholder:text-yellow-800 text-center text-lg tracking-[0.3em]"
                />
                <div className="flex gap-2">
                  <button
                    className="pixel-btn flex-1 text-sm py-2 opacity-60"
                    onClick={() => { setShowJoinDialog(false); setNameInput(''); setRoomIdInput(''); }}
                  >
                    Cancel
                  </button>
                  <button
                    className="pixel-btn flex-1 text-sm py-2"
                    onClick={handleJoin}
                    disabled={!nameInput.trim() || roomIdInput.trim().length < 4}
                  >
                    Join
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Lobby ----
    function Lobby({ onReady, onStartGame, onLeave, onSelectCharacter }) {
      const gs = useGame();
      const { roomId, roomMode, isHost, players, playerId } = gs.state;
      const [showCharacterSelect, setShowCharacterSelect] = useState(false);

      const me = players.find(p => p.id === playerId);
      const myReady = me ? me.isReady : false;
      const myCharacter = me && me.characterId ? getCharacter(me.characterId) : null;

      const allReady = players.length > 0 && players.every(p => p.isReady && p.characterId);
      const canStart = isHost && allReady;

      const handleCopy = () => {
        if (roomId) {
          navigator.clipboard.writeText(roomId).catch(() => {});
        }
      };

      const handleSelectChar = (charId) => {
        onSelectCharacter(charId);
        setShowCharacterSelect(false);
      };

      // Character select overlay
      if (showCharacterSelect) {
        return (
          <div className="flex flex-col items-center min-h-screen px-4 py-6 game-bg">
            <div className="text-center mb-4">
              <h2 className="pixel-font text-xl sm:text-2xl text-yellow-400">Choose Your Champion</h2>
              <p className="pixel-font text-xs text-yellow-600/50">Select a character to enter the arena</p>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 w-full max-w-4xl mb-4">
              {CHARACTERS.map((char, idx) => {
                const takenBy = players.find(p => p.characterId === char.id && p.id !== playerId);
                return (
                  <button
                    key={char.id}
                    className={`pixel-card p-3 text-left transition-all cursor-pointer anim-fade-in-up ${
                      takenBy ? 'opacity-40 pointer-events-none' : 'hover:brightness-110'
                    }`}
                    style={{ animationDelay: `${idx * 0.03}s` }}
                    onClick={() => handleSelectChar(char.id)}
                    disabled={!!takenBy}
                  >
                    <div className="flex items-center gap-2 mb-1">
                      <div
                        className="w-10 h-10 flex items-center justify-center text-xl rounded border-2"
                        style={{ borderColor: char.color, backgroundColor: `${char.color}15` }}
                      >
                        {char.emoji}
                      </div>
                      <div className="min-w-0 flex-1">
                        <h3 className="pixel-font text-xs font-bold truncate" style={{ color: char.color }}>
                          {char.name}
                        </h3>
                        <p className="pixel-font text-xs text-yellow-600/50">{char.role}</p>
                      </div>
                    </div>
                    <div
                      className="p-1.5 rounded mt-1"
                      style={{ backgroundColor: `${char.color}10`, borderLeft: `2px solid ${char.color}` }}
                    >
                      <div className="pixel-font text-xs" style={{ color: char.color }}>
                        {char.skillName}: {char.skillDescription}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
            <button
              className="pixel-btn text-sm py-2 px-6 opacity-60"
              onClick={() => setShowCharacterSelect(false)}
            >
              Back to Lobby
            </button>
          </div>
        );
      }

      return (
        <div className="flex flex-col items-center justify-center min-h-screen px-4 game-bg">
          {/* Room info card */}
          <div className="pixel-card p-6 sm:p-8 w-full max-w-lg mb-4">
            <div className="flex items-center justify-between mb-5">
              <div>
                <p className="pixel-font text-xs text-yellow-600/60 mb-1">ROOM CODE</p>
                <div className="flex items-center gap-2">
                  <span className="pixel-font text-3xl text-yellow-400 tracking-[0.4em]">
                    {roomId || '-----'}
                  </span>
                  <button
                    onClick={handleCopy}
                    className="text-yellow-500/60 hover:text-yellow-400 transition-colors text-sm"
                    title="Copy room code"
                  >
                    {'\u{1F4CB}'}
                  </button>
                </div>
              </div>
              <div className="pixel-border px-3 py-1">
                <span className="pixel-font text-sm text-yellow-400">
                  {roomMode === 'duel' ? '\u2694\uFE0F Duel' : '\u{1F3DF}\uFE0F Arena'}
                </span>
              </div>
            </div>

            <div className="flex items-center gap-2 mb-4">
              <div className="flex-1 h-px bg-yellow-800/30" />
              <span className="pixel-font text-xs text-yellow-600/40">PLAYERS</span>
              <div className="flex-1 h-px bg-yellow-800/30" />
            </div>

            {/* Player list */}
            <div className="space-y-2 mb-4">
              {players.map((player, idx) => {
                const char = getCharacter(player.characterId);
                return (
                  <div
                    key={player.id}
                    className={`pixel-card p-2.5 flex items-center gap-2 transition-all ${
                      player.id === playerId ? 'ring-1 ring-yellow-500/30' : ''
                    }`}
                  >
                    <span className="pixel-font text-sm text-yellow-700/50 w-5 text-center">{idx + 1}</span>
                    <div
                      className="w-9 h-9 flex items-center justify-center rounded border-2 text-lg"
                      style={{
                        borderColor: char ? char.color : '#555',
                        backgroundColor: `${char ? char.color : '#333'}20`,
                      }}
                    >
                      {char ? char.emoji : '\u2753'}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="pixel-font text-sm text-yellow-200 truncate">
                        {player.name}
                        {player.id === playerId && <span className="text-yellow-600/50 ml-1">(you)</span>}
                      </div>
                      <div className="pixel-font text-xs text-yellow-600/50">
                        {char ? char.name : 'No character selected'}
                      </div>
                    </div>
                    <div className="flex items-center gap-1">
                      {player.isReady ? (
                        <span className="pixel-font text-xs text-green-400 px-2 py-0.5 border border-green-600/40 bg-green-900/20">
                          {'\u2713'} READY
                        </span>
                      ) : (
                        <span className="pixel-font text-xs text-yellow-600/40 px-2 py-0.5 border border-yellow-800/20">
                          WAITING
                        </span>
                      )}
                      {player.id === (players[0] && players[0].id) && (
                        <span className="pixel-font text-xs text-yellow-500 ml-1">{'\u{1F451}'}</span>
                      )}
                    </div>
                  </div>
                );
              })}

              {/* Empty slots for arena */}
              {roomMode === 'arena' &&
                Array.from({ length: Math.max(0, 4 - players.length) }).map((_, i) => (
                  <div key={`empty-${i}`} className="pixel-card p-2.5 flex items-center gap-2 opacity-30">
                    <span className="pixel-font text-sm text-yellow-700/30 w-5 text-center">{players.length + i + 1}</span>
                    <div className="w-9 h-9 flex items-center justify-center rounded border-2 border-dashed border-yellow-800/30 text-lg text-yellow-900/30">?</div>
                    <span className="pixel-font text-sm text-yellow-800/30">Waiting for player...</span>
                  </div>
                ))}
            </div>
          </div>

          {/* My character selection */}
          <div className="pixel-card p-4 w-full max-w-lg mb-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                {myCharacter ? (
                  <>
                    <div
                      className="w-10 h-10 flex items-center justify-center rounded border-2 text-xl"
                      style={{ borderColor: myCharacter.color, backgroundColor: `${myCharacter.color}20` }}
                    >
                      {myCharacter.emoji}
                    </div>
                    <div>
                      <div className="pixel-font text-sm" style={{ color: myCharacter.color }}>{myCharacter.name}</div>
                      <div className="pixel-font text-xs text-yellow-600/50">
                        {myCharacter.role} — {myCharacter.skillName}
                      </div>
                    </div>
                  </>
                ) : (
                  <div className="pixel-font text-sm text-yellow-600/40">No character selected</div>
                )}
              </div>
              <button
                className="pixel-btn text-xs py-1.5 px-3"
                onClick={() => setShowCharacterSelect(true)}
              >
                {myCharacter ? 'Change' : 'Select Character'}
              </button>
            </div>
          </div>

          {/* Action buttons */}
          <div className="flex flex-col sm:flex-row gap-3 w-full max-w-lg">
            <button
              className={`pixel-btn flex-1 text-sm py-3 ${myReady ? 'ring-2 ring-green-500' : ''}`}
              onClick={() => onReady(!myReady)}
              disabled={!myCharacter}
            >
              {myReady ? '\u2713 Ready' : 'Ready Up'}
            </button>
            {isHost && (
              <button
                className={`pixel-btn flex-1 text-sm py-3 ${canStart ? '' : 'opacity-40 cursor-not-allowed'}`}
                onClick={onStartGame}
                disabled={!canStart}
              >
                {'\u{1F680}'} Start Game
              </button>
            )}
            <button className="pixel-btn flex-1 text-sm py-3 opacity-60" onClick={onLeave}>
              Leave Room
            </button>
          </div>
        </div>
      );
    }

    // ---- GameBoard ----
    function GameBoard({ board, selectedBlock, disabled, size, dragBlock, hoverCell, isValidPlacement }) {
      const cellSize = CELL_SIZES[size || 'lg'];

      const ghostCells = useMemo(() => {
        if (!dragBlock || !hoverCell) return new Map();
        const map = new Map();
        for (const cell of dragBlock.cells) {
          const r = hoverCell.row + cell.row;
          const c = hoverCell.col + cell.col;
          map.set(`${r},${c}`, true);
        }
        return map;
      }, [dragBlock, hoverCell]);

      const boardPx = cellSize * BOARD_SIZE;

      return (
        <div className="relative select-none" style={{ width: boardPx, height: boardPx }}>
          <div
            className="grid"
            style={{
              gridTemplateColumns: `repeat(${BOARD_SIZE}, ${cellSize}px)`,
              gridTemplateRows: `repeat(${BOARD_SIZE}, ${cellSize}px)`,
            }}
          >
            {board.map((row, r) =>
              row.map((cell, c) => {
                const key = `${r},${c}`;
                const isGhost = ghostCells.has(key);
                const color = cell !== 0 ? getCellColor(cell) : undefined;
                const ghostColor = isGhost
                  ? isValidPlacement
                    ? getCellColor(dragBlock.color)
                    : 'rgba(255, 50, 50, 0.4)'
                  : undefined;

                return (
                  <div
                    key={key}
                    className={`board-cell ${color ? 'board-cell-filled' : ''} ${
                      isGhost && isValidPlacement ? 'board-cell-hover' : ''
                    }`}
                    style={{
                      width: cellSize, height: cellSize,
                      backgroundColor: color || (isGhost ? ghostColor : 'rgba(255,255,255,0.03)'),
                      border: isGhost && !isValidPlacement ? '2px solid rgba(255,50,50,0.6)' : undefined,
                      borderWidth: isGhost && !isValidPlacement ? 2 : undefined,
                    }}
                  />
                );
              })
            )}
          </div>

          {/* Grid line overlay */}
          <div
            className="absolute inset-0 pointer-events-none"
            style={{
              backgroundImage: `
                linear-gradient(to right, rgba(255,215,0,0.06) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,215,0,0.06) 1px, transparent 1px)
              `,
              backgroundSize: `${cellSize}px ${cellSize}px`,
            }}
          />

          {/* Outer border */}
          <div className="absolute inset-0 pointer-events-none border-2 border-yellow-800/30" />
        </div>
      );
    }

    // ---- BlockSelector ----
    function BlockSelector({ blocks, onDragStart, isDragging, draggedBlockId }) {
      if (!blocks || !blocks.length) return null;

      return (
        <div className="flex items-center justify-center gap-4 sm:gap-6 flex-wrap py-2">
          {blocks.map((block) => {
            const { rows, cols } = getShapeBounds(block.cells);
            const isBeingDragged = draggedBlockId === block.id;

            return (
              <div
                key={block.id}
                className={`block-preview p-3 rounded-lg transition-all ${
                  isBeingDragged ? 'is-being-dragged' : isDragging ? 'opacity-50' : 'cursor-grab active:cursor-grabbing'
                }`}
                onPointerDown={(e) => onDragStart(block, e)}
                style={{ touchAction: 'none' }}
              >
                <div
                  className="grid"
                  style={{
                    gridTemplateColumns: `repeat(${cols}, ${PREVIEW_CELL}px)`,
                    gridTemplateRows: `repeat(${rows}, ${PREVIEW_CELL}px)`,
                    gap: '1px',
                  }}
                >
                  {Array.from({ length: rows * cols }).map((_, i) => {
                    const r = Math.floor(i / cols);
                    const c = i % cols;
                    const hasCell = block.cells.some(cell => cell.row === r && cell.col === c);
                    return (
                      <div
                        key={i}
                        className={`rounded-sm ${hasCell ? 'board-cell-filled' : ''}`}
                        style={{
                          width: PREVIEW_CELL, height: PREVIEW_CELL,
                          backgroundColor: hasCell ? BLOCK_COLORS[block.color] || '#888' : 'transparent',
                        }}
                      />
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ---- GameHUD ----
    function GameHUD({ onUseSkill }) {
      const gs = useGame();
      const { players, playerId, gameStartTime } = gs.state;
      const [elapsed, setElapsed] = useState(0);
      const prevScoreRef = useRef(null);

      const me = players.find(p => p.id === playerId);
      const char = me ? getCharacter(me.characterId) : null;

      useEffect(() => {
        if (!gameStartTime) return;
        const interval = setInterval(() => {
          setElapsed(Math.floor((Date.now() - gameStartTime) / 1000));
        }, 1000);
        return () => clearInterval(interval);
      }, [gameStartTime]);

      if (!me || !char) return null;

      const energyPct = Math.round((me.energy / me.maxEnergy) * 100);
      const canSkill = me.energy >= me.maxEnergy && me.skillCooldown <= 0;
      const comboActive = me.combo > 0;

      const formatTime = (s) => {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${m}:${sec.toString().padStart(2, '0')}`;
      };

      // Detect score changes for animation
      const scoreKey = me.score;
      const scoreChanged = prevScoreRef.current !== null && prevScoreRef.current !== me.score;
      useEffect(() => { prevScoreRef.current = me.score; }, [me.score]);

      return (
        <div className="w-full">
          {/* Top HUD bar */}
          <div className="flex items-center justify-between gap-2 sm:gap-4 px-2 sm:px-4 py-2 pixel-card mb-2">
            {/* Left: Player info */}
            <div className="flex items-center gap-2 min-w-0">
              <div
                className="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded border-2 text-lg sm:text-xl flex-shrink-0"
                style={{ borderColor: char.color, backgroundColor: `${char.color}20` }}
              >
                {char.emoji}
              </div>
              <div className="min-w-0 hidden sm:block">
                <div className="pixel-font text-xs text-yellow-300 truncate">{me.name}</div>
                <div className="pixel-font text-xs text-yellow-600/50">{char.name}</div>
              </div>
            </div>

            {/* Center: Score + Combo */}
            <div className="flex flex-col items-center">
              <div className="pixel-font text-xs text-yellow-600/50">SCORE</div>
              <div
                key={scoreKey}
                className={`pixel-font text-xl sm:text-2xl text-yellow-400 ${scoreChanged ? 'score-flash' : ''}`}
              >
                {me.score.toLocaleString()}
              </div>
              {comboActive && (
                <div
                  key={`combo-${me.combo}`}
                  className="pixel-font text-sm font-bold anim-fade-in-up"
                  style={{
                    color: me.combo >= 3 ? '#ff4400' : '#ff8800',
                    animation: me.combo >= 3 ? 'comboFire 0.5s ease-in-out infinite, fadeInUp 0.2s ease-out' : undefined,
                    textShadow: '0 0 10px #ff6600',
                  }}
                >
                  {'\u{1F525}'} COMBO x{me.combo}
                </div>
              )}
            </div>

            {/* Right: Timer */}
            <div className="flex flex-col items-center">
              <div className="pixel-font text-xs text-yellow-600/50">TIME</div>
              <div className="pixel-font text-lg text-yellow-300/80">{formatTime(elapsed)}</div>
            </div>
          </div>

          {/* Bottom HUD: Energy + Skill */}
          <div className="flex items-center gap-2 sm:gap-4 px-2 sm:px-4 py-2 pixel-card">
            {/* Energy bar */}
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between mb-1">
                <span className="pixel-font text-xs text-yellow-600/50">{'\u26A1'} ENERGY</span>
                <span className={`pixel-font text-xs ${canSkill ? 'text-yellow-400' : 'text-yellow-700/50'}`}>
                  {me.energy}/{me.maxEnergy}
                </span>
              </div>
              <div className="h-3 sm:h-4 bg-black/40 border border-yellow-800/30 rounded-sm overflow-hidden">
                <div
                  className="h-full rounded-sm transition-all duration-300"
                  style={{
                    width: `${energyPct}%`,
                    background: canSkill
                      ? `linear-gradient(90deg, ${char.color}, #ffd700)`
                      : `linear-gradient(90deg, ${char.color}80, ${char.color}40)`,
                    boxShadow: canSkill ? `0 0 10px ${char.color}60` : undefined,
                  }}
                />
              </div>
            </div>

            {/* Skill button */}
            <button
              className={`pixel-btn flex-shrink-0 text-xs py-2 px-3 sm:px-4 relative overflow-hidden ${canSkill ? '' : 'opacity-40'}`}
              onClick={() => canSkill && onUseSkill()}
              disabled={!canSkill}
              style={{ borderColor: char.color, color: canSkill ? char.color : undefined }}
            >
              {me.skillCooldown > 0 && (
                <div className="absolute inset-0 bg-black/60 flex items-center justify-center pixel-font text-xs text-yellow-600/50">
                  {me.skillCooldown}s
                </div>
              )}
              <span className="flex items-center gap-1">
                <span>{'\u26A1'}</span>
                <span className="hidden sm:inline">{char.skillName}</span>
                <span className="sm:hidden">Skill</span>
              </span>
            </button>
          </div>
        </div>
      );
    }

    // ---- OpponentBoard ----
    function OpponentBoard({ player, onClick }) {
      const gs = useGame();
      const { skillUsedBy } = gs.state;
      const char = getCharacter(player.characterId);
      const isTarget = skillUsedBy && skillUsedBy.targetId === player.id;
      const boardPx = 12 * BOARD_SIZE;

      return (
        <button
          className={`relative p-2 pixel-card transition-all cursor-pointer ${
            !player.isAlive ? 'opacity-40' : ''
          } ${isTarget ? 'ring-2 ring-red-500 animate-pulse' : ''}`}
          onClick={onClick}
        >
          <div className="flex items-center gap-2 mb-2">
            <div
              className="w-6 h-6 flex items-center justify-center rounded border text-xs flex-shrink-0"
              style={{ borderColor: char ? char.color : '#555', backgroundColor: `${char ? char.color : '#333'}20` }}
            >
              {char ? char.emoji : '\u2753'}
            </div>
            <div className="min-w-0 flex-1">
              <div className="pixel-font text-xs text-yellow-300 truncate">{player.name}</div>
              <div className="pixel-font text-xs text-yellow-600/50">{player.score.toLocaleString()} pts</div>
            </div>
          </div>

          <div className="relative select-none" style={{ width: boardPx, height: boardPx }}>
            <div
              className="grid"
              style={{
                gridTemplateColumns: `repeat(${BOARD_SIZE}, 12px)`,
                gridTemplateRows: `repeat(${BOARD_SIZE}, 12px)`,
              }}
            >
              {player.board.map((row, r) =>
                row.map((cell, c) => {
                  const color = cell !== 0 ? getCellColor(cell) : undefined;
                  return (
                    <div
                      key={`${r}-${c}`}
                      className={`rounded-sm ${color ? 'board-cell-filled' : ''}`}
                      style={{
                        width: 12, height: 12,
                        backgroundColor: color || 'rgba(255,255,255,0.02)',
                      }}
                    />
                  );
                })
              )}
            </div>
            <div
              className="absolute inset-0 pointer-events-none"
              style={{
                backgroundImage: `
                  linear-gradient(to right, rgba(255,215,0,0.04) 1px, transparent 1px),
                  linear-gradient(to bottom, rgba(255,215,0,0.04) 1px, transparent 1px)
                `,
                backgroundSize: '12px 12px',
              }}
            />
            {!player.isAlive && (
              <div className="absolute inset-0 bg-black/60 flex items-center justify-center">
                <span className="pixel-font text-xs text-red-400">{'\u{1F480}'} OUT</span>
              </div>
            )}
            {isTarget && (
              <div className="absolute inset-0 bg-red-500/20 animate-pulse pointer-events-none" />
            )}
          </div>
        </button>
      );
    }

    // ---- Confetti ----
    const CONFETTI_COLORS = ['#ffd700', '#ef4444', '#22c55e', '#3b82f6', '#ec4899', '#8b5cf6', '#f97316'];

    function Confetti() {
      const particles = useMemo(() => {
        return Array.from({ length: 40 }).map((_, i) => ({
          id: i,
          left: `${Math.random() * 100}%`,
          color: CONFETTI_COLORS[i % CONFETTI_COLORS.length],
          size: 6 + Math.random() * 8,
          delay: Math.random() * 2,
          duration: 2 + Math.random() * 3,
          borderRadius: Math.random() > 0.5 ? '50%' : '2px',
        }));
      }, []);

      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden" style={{ zIndex: 50 }}>
          {particles.map((p) => (
            <div
              key={p.id}
              className="confetti-particle"
              style={{
                left: p.left,
                width: p.size, height: p.size,
                backgroundColor: p.color,
                borderRadius: p.borderRadius,
                animation: `confetti ${p.duration}s ease-in ${p.delay}s forwards`,
              }}
            />
          ))}
        </div>
      );
    }

    // ---- GameOverScreen ----
    function GameOverScreen({ onPlayAgain, onBackToMenu }) {
      const gs = useGame();
      const { winnerId, rankings, playerId } = gs.state;
      const isWinner = winnerId === playerId;
      const winnerRank = rankings.find(r => r.id === playerId);

      return (
        <div className="flex flex-col items-center justify-center min-h-screen px-4 game-bg overflow-hidden">
          {isWinner && <Confetti />}

          {/* Title */}
          <div className="text-center mb-8 anim-pop-in">
            <div className="text-5xl mb-2">{isWinner ? '\u{1F451}' : '\u{1F480}'}</div>
            <h1
              className="pixel-font text-4xl sm:text-5xl md:text-6xl font-bold mb-2"
              style={{
                color: isWinner ? '#ffd700' : '#ef4444',
                textShadow: isWinner
                  ? '0 0 30px rgba(255,215,0,0.5), 0 0 60px rgba(255,215,0,0.2)'
                  : '0 0 30px rgba(239,68,68,0.5)',
              }}
            >
              {isWinner ? 'VICTORY' : 'GAME OVER'}
            </h1>
            <p className="pixel-font text-sm text-yellow-600/60">
              {isWinner
                ? 'You are the champion!'
                : winnerRank
                  ? `You placed #${winnerRank.rank}`
                  : 'Better luck next time!'}
            </p>
          </div>

          {/* Rankings */}
          <div className="pixel-card p-4 sm:p-6 w-full max-w-md mb-8 anim-fade-in-up anim-delay-3">
            <h2 className="pixel-font text-lg text-yellow-400 text-center mb-4">
              {'\u{1F3C6}'} Rankings
            </h2>
            <div className="space-y-2">
              {rankings.map((rank, idx) => {
                const char = getCharacter(rank.characterId);
                const isMe = rank.id === playerId;

                return (
                  <div
                    key={rank.id}
                    className={`flex items-center gap-3 p-2 rounded transition-all anim-fade-in-up ${
                      isMe ? 'bg-yellow-900/20 ring-1 ring-yellow-600/30' : 'bg-black/10'
                    }`}
                    style={{ animationDelay: `${0.4 + idx * 0.1}s` }}
                  >
                    <div className="w-8 text-center">
                      <span
                        className="pixel-font text-lg"
                        style={{
                          color: rank.rank === 1 ? '#ffd700'
                            : rank.rank === 2 ? '#c0c0c0'
                            : rank.rank === 3 ? '#cd7f32'
                            : '#666',
                        }}
                      >
                        {rank.rank === 1 ? '\u{1F451}' : `#${rank.rank}`}
                      </span>
                    </div>
                    <div
                      className="w-8 h-8 flex items-center justify-center rounded border text-base"
                      style={{
                        borderColor: char ? char.color : '#555',
                        backgroundColor: `${char ? char.color : '#333'}20`,
                      }}
                    >
                      {char ? char.emoji : '\u2753'}
                    </div>
                    <div className="flex-1 min-w-0">
                      <span className={`pixel-font text-sm ${isMe ? 'text-yellow-300' : 'text-yellow-200/70'}`}>
                        {rank.name}
                        {isMe && <span className="text-yellow-600/40 ml-1">(you)</span>}
                      </span>
                    </div>
                    <span className="pixel-font text-sm text-yellow-500/60">
                      {rank.score.toLocaleString()}
                    </span>
                    {!rank.isAlive && <span className="text-xs">{'\u{1F480}'}</span>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Buttons */}
          <div className="flex flex-col sm:flex-row gap-3 anim-fade-in-up anim-delay-8">
            <button className="pixel-btn text-sm py-3 px-8" onClick={onPlayAgain}>
              {'\u{1F504}'} Play Again
            </button>
            <button className="pixel-btn text-sm py-3 px-8 opacity-60" onClick={onBackToMenu}>
              {'\u{1F3E0}'} Back to Menu
            </button>
          </div>
        </div>
      );
    }

    // ---- GameContainer ----
    function GameContainer({ placeBlock, onUseSkill, leaveRoom }) {
      const gs = useGame();
      const { players, playerId, availableBlocks, notifications, screenShake } = gs.state;

      const me = players.find(p => p.id === playerId);
      const opponents = players.filter(p => p.id !== playerId);
      const myBoard = me ? me.board : Array.from({ length: 10 }, () => Array(10).fill(0));

      // Drag & Drop State
      const boardRef = useRef(null);
      const [isDragging, setIsDragging] = useState(false);
      const [dragBlock, setDragBlock] = useState(null);
      const [cursorPos, setCursorPos] = useState({ x: 0, y: 0 });
      const [hoverCell, setHoverCell] = useState(null);

      const dragBlockRef = useRef(null);
      const myBoardRef = useRef(myBoard);
      const placeBlockRef = useRef(placeBlock);
      const cursorPosRef = useRef(cursorPos);

      useEffect(() => { myBoardRef.current = myBoard; }, [myBoard]);
      useEffect(() => { placeBlockRef.current = placeBlock; }, [placeBlock]);
      useEffect(() => { cursorPosRef.current = cursorPos; }, [cursorPos]);

      function computeHoverCell(x, y, boardEl, block) {
        if (!boardEl) return null;
        const rect = boardEl.getBoundingClientRect();
        const cellSize = rect.width / 10;

        let maxR = 0, maxC = 0;
        if (block) {
          for (const cell of block.cells) {
            if (cell.row > maxR) maxR = cell.row;
            if (cell.col > maxC) maxC = cell.col;
          }
        }
        const offsetX = (maxC * cellSize) / 2;
        const offsetY = (maxR * cellSize) / 2;

        const col = Math.floor((x - rect.left - offsetX) / cellSize);
        const row = Math.floor((y - rect.top - offsetY) / cellSize);
        if (row < 0 || row >= 10 || col < 0 || col >= 10) return null;
        return { row, col };
      }

      const isValidPlacement = useMemo(() => {
        if (!dragBlock || !hoverCell) return false;
        return canPlaceBlock(myBoard, dragBlock, hoverCell);
      }, [dragBlock, hoverCell, myBoard]);

      const handleDragStart = useCallback((block, e) => {
        e.preventDefault();
        dragBlockRef.current = block;
        setDragBlock(block);
        const x = e.clientX;
        const y = e.clientY;
        setCursorPos({ x, y });
        setHoverCell(computeHoverCell(x, y, boardRef.current, block));
        setIsDragging(true);
        gs.selectBlock(null);
      }, [gs]);

      useEffect(() => {
        if (!isDragging) return;

        const handleMove = (e) => {
          e.preventDefault();
          const x = e.clientX;
          const y = e.clientY;
          setCursorPos({ x, y });
          setHoverCell(computeHoverCell(x, y, boardRef.current, dragBlockRef.current));
        };

        const handleUp = () => {
          const block = dragBlockRef.current;
          const board = myBoardRef.current;
          const pos = cursorPosRef.current;

          if (block && boardRef.current && board) {
            const cell = computeHoverCell(pos.x, pos.y, boardRef.current, block);
            if (cell && canPlaceBlock(board, block, cell)) {
              // Optimistically remove block from store
              const currentBlocks = gs.getState().availableBlocks;
              gs.setAvailableBlocks(currentBlocks.filter(b => b.id !== block.id));
              // Send to server
              placeBlockRef.current(block, cell);
            }
          }

          setIsDragging(false);
          setDragBlock(null);
          setHoverCell(null);
          dragBlockRef.current = null;
        };

        document.addEventListener('pointermove', handleMove);
        document.addEventListener('pointerup', handleUp);
        document.addEventListener('pointercancel', handleUp);
        return () => {
          document.removeEventListener('pointermove', handleMove);
          document.removeEventListener('pointerup', handleUp);
          document.removeEventListener('pointercancel', handleUp);
        };
      }, [isDragging, gs]);

      const boardSize = useMemo(() => {
        if (typeof window === 'undefined') return 'lg';
        return window.innerWidth < 640 ? 'md' : 'lg';
      }, []);

      const ghostBounds = useMemo(() => {
        if (!dragBlock) return null;
        let maxRow = 0, maxCol = 0;
        for (const cell of dragBlock.cells) {
          if (cell.row > maxRow) maxRow = cell.row;
          if (cell.col > maxCol) maxCol = cell.col;
        }
        return { rows: maxRow + 1, cols: maxCol + 1 };
      }, [dragBlock]);

      const handleTargetOpponent = useCallback((opponentId) => {
        onUseSkill(opponentId);
      }, [onUseSkill]);

      return (
        <div className={`flex flex-col min-h-screen game-bg ${screenShake ? 'screen-shake' : ''}`}>
          {/* HUD at top */}
          <div className="w-full max-w-6xl mx-auto px-2 sm:px-4 pt-2">
            <GameHUD onUseSkill={() => onUseSkill()} />
          </div>

          {/* Main game area */}
          <div className="flex-1 flex flex-col lg:flex-row items-start justify-center gap-3 sm:gap-4 px-2 sm:px-4 py-2 max-w-6xl mx-auto w-full">
            {/* Opponents */}
            {opponents.length > 0 && (
              <div className="flex lg:flex-col gap-2 lg:order-first order-last w-full lg:w-auto overflow-x-auto lg:overflow-visible">
                {opponents.map(opp => (
                  <OpponentBoard
                    key={opp.id}
                    player={opp}
                    onClick={() => handleTargetOpponent(opp.id)}
                  />
                ))}
              </div>
            )}

            {/* Center: Board + Block tray */}
            <div className="flex flex-col items-center gap-3 flex-shrink-0">
              <div ref={boardRef}>
                <GameBoard
                  board={myBoard}
                  selectedBlock={null}
                  disabled={true}
                  size={boardSize}
                  dragBlock={isDragging ? dragBlock : null}
                  hoverCell={hoverCell}
                  isValidPlacement={isValidPlacement}
                />
              </div>

              <div className="pixel-card p-3 w-full">
                <div className="pixel-font text-xs text-yellow-600/40 text-center mb-2">
                  DRAG A BLOCK TO THE BOARD
                </div>
                <BlockSelector
                  blocks={availableBlocks}
                  onDragStart={handleDragStart}
                  isDragging={isDragging}
                  draggedBlockId={dragBlock ? dragBlock.id : undefined}
                />
                <div className="pixel-font text-xs text-yellow-600/50 text-center mt-2">
                  {availableBlocks.length} / 3 blocks remaining
                </div>
              </div>
            </div>

            <div className="hidden lg:block w-48" />
          </div>

          {/* Floating drag ghost */}
          {isDragging && dragBlock && ghostBounds && (
            <div
              className="fixed pointer-events-none select-none"
              style={{
                left: cursorPos.x - (ghostBounds.cols * GHOST_CELL) / 2,
                top: cursorPos.y - (ghostBounds.rows * GHOST_CELL) / 2,
                opacity: 0.75,
                filter: 'drop-shadow(0 0 8px rgba(255,215,0,0.5))',
                zIndex: 50,
              }}
            >
              <div
                className="grid"
                style={{
                  gridTemplateColumns: `repeat(${ghostBounds.cols}, ${GHOST_CELL}px)`,
                  gridTemplateRows: `repeat(${ghostBounds.rows}, ${GHOST_CELL}px)`,
                  gap: '1px',
                }}
              >
                {Array.from({ length: ghostBounds.rows * ghostBounds.cols }).map((_, i) => {
                  const r = Math.floor(i / ghostBounds.cols);
                  const c = i % ghostBounds.cols;
                  const hasCell = dragBlock.cells.some(cell => cell.row === r && cell.col === c);
                  return (
                    <div
                      key={i}
                      className={`rounded-sm ${hasCell ? 'board-cell-filled' : ''}`}
                      style={{
                        width: GHOST_CELL, height: GHOST_CELL,
                        backgroundColor: hasCell ? (BLOCK_COLORS[dragBlock.color] || '#888') : 'transparent',
                      }}
                    />
                  );
                })}
              </div>
            </div>
          )}

          {/* Notifications */}
          <div className="fixed top-20 right-2 sm:right-4 flex flex-col gap-2 z-40 max-w-xs">
            {notifications.map(notif => (
              <div
                key={notif.id}
                className={`notification-enter pixel-card px-3 py-2 text-xs pixel-font ${
                  notif.type === 'skill' ? 'text-purple-300 border-l-4 border-purple-500'
                  : notif.type === 'danger' ? 'text-red-300 border-l-4 border-red-500'
                  : notif.type === 'success' ? 'text-green-300 border-l-4 border-green-500'
                  : 'text-yellow-300 border-l-4 border-yellow-500'
                }`}
              >
                {notif.message}
              </div>
            ))}
          </div>

          {/* Leave button */}
          <div className="fixed bottom-2 left-2 z-30">
            <button
              className="pixel-font text-xs text-yellow-800/30 hover:text-yellow-600/50 transition-colors"
              onClick={leaveRoom}
            >
              {'\u2715'} Leave
            </button>
          </div>
        </div>
      );
    }

    // =========================================================================
    //  APP — Main Router
    // =========================================================================

    function App() {
      const socket = useGameSocket();
      const gs = useGame();
      const { currentScreen } = gs.state;

      const handleBackToMenu = useCallback(() => {
        gs.resetGame();
      }, [gs]);

      switch (currentScreen) {
        case 'lobby':
          return (
            <Lobby
              onReady={socket.playerReady}
              onStartGame={socket.startGame}
              onLeave={socket.leaveRoom}
              onSelectCharacter={socket.selectCharacter}
            />
          );
        case 'game':
          return (
            <GameContainer
              placeBlock={socket.placeBlock}
              onUseSkill={socket.useSkill}
              leaveRoom={socket.leaveRoom}
            />
          );
        case 'game-over':
          return (
            <GameOverScreen
              onPlayAgain={socket.playAgain}
              onBackToMenu={handleBackToMenu}
            />
          );
        default:
          return (
            <MainMenu
              onCreateRoom={socket.createRoom}
              onJoinRoom={socket.joinRoom}
              isConnected={gs.state.isConnected}
            />
          );
      }
    }

    // =========================================================================
    //  RENDER
    // =========================================================================

    function Root() {
      return (
        <GameProvider>
          <App />
        </GameProvider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root />);
  </script>
</body>
</html>
